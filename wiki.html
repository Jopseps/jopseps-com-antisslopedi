<!DOCTYPE html>
<html lang="tr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" href="files/images/favicon.svg" type="image/svg+xml">
        <meta name="description" content="Tıss evreninin resmi ansiklopedisi.">
        <meta name="theme-color" content="#1e1e1e">
        <meta property="og:site_name" content="Antısslopedi">
        <meta property="og:title" content="Antısslopedi">
        <meta property="og:description" content="Tıss evreninin resmi ansiklopedisi.">
        <meta property="og:type" content="website">
        <title>Antısslopedi</title>
    </head>
    <body class="background">
        <div class="site-wrapper">
            <header class="site-header">
                <div class="site-header-left">
                    <a href="index.html" class="site-header-title">Antısslopedi</a>
                    <a href="karakterler.html" class="site-header-link">Karakterler</a>
                </div>
                <div class="site-header-right">
                    <span id="auth-strip" class="auth-strip"></span>
                    <button id="darkModeButton" onclick="switchColorScheme()" aria-label="Tema değiştir">🌙</button>
                </div>
            </header>
            <main class="site-content">
                <section class="wiki-grid">
                    <nav class="wiki-toc" id="wiki-toc" aria-label="İçindekiler">
                        <button class="wiki-toc-title" type="button" onclick="toggleTOC()">İçindekiler</button>
                        <ol id="wiki-toc-list"></ol>
                    </nav>

                    <article class="wiki-article" id="article">
                        <header class="wiki-lead">
                            <div class="wiki-actions" id="wiki-actions"></div>
                            <h1 class="wiki-title" id="wiki-title"><span class="wiki-skeleton title" style="display:block;"></span></h1>
                            <p class="wiki-summary" id="wiki-summary"></p>
                        </header>
                        <div id="wiki-sections">
                            <div class="wiki-skeleton wide"></div>
                            <div class="wiki-skeleton mid"></div>
                            <div class="wiki-skeleton wide"></div>
                            <div class="wiki-skeleton short"></div>
                        </div>
                    </article>

                    <aside class="wiki-infobox" aria-label="Bilgi kutusu">
                        <figure class="wiki-infobox-image" id="infobox-image"><div class="wiki-skeleton portrait"></div></figure>
                        <figcaption id="infobox-caption" style="text-align:center; margin-top:6px; font-size:90%; opacity:0.9;"></figcaption>
                        <div class="wiki-infobox-body" id="infobox-body"></div>
                    </aside>
                </section>
            </main>

            <footer class="site-footer">
                <div class="footer-content" id="footer">
                    <div class="footer-section">
                        <h4>Antısslopedi</h4>
                        <p>Tıss evreninin resmi ansiklopedisi.</p>
                    </div>
                    <div class="footer-section">
                        <h4>Bağlantılar</h4>
                        <ul>
                            <li><a href="index.html">Ana Sayfa</a></li>
                            <li><a href="karakterler.html">Karakterler</a></li>
                            <li><a href="https://jopseps.com">jopseps.com</a></li>
                        </ul>
                    </div>
                </div>
                <div class="footer-bottom">
                    © 2026 Jopseps. All rights reserved.
                </div>
            </footer>
        </div>

        <script src="files/js/features.js"></script>
        <script src="files/js/auth.js"></script>
        <script src="files/js/wiki.js"></script>
    </body>
</html>
